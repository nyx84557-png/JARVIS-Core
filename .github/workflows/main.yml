name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgmp3-dev
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Package with Buildozer
        run: |
          buildozer init
          # Overwrite permissions for audio
          sed -i 's/#android.permissions =/android.permissions = RECORD_AUDIO, INTERNET/' buildozer.spec
          # Auto accept root warning and compile
          yes | buildozer android debug

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: J.A.R.V.I.S.-App
          path: bin/*.apk
